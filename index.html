<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>伊良部語 POS リファレンス</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic&family=Cormorant+Garamond:wght@700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f9f7f3;--card:#fff;--card2:#f3efe6;
  --text:#1e1a14;--body:#302a20;--muted:#7a6e5d;--dim:#a89b8a;
  --red:#9e3a1e;--red-l:#f0d8cc;--red-bg:rgba(158,58,30,.07);
  --grn:#1e6b54;--grn-l:#d0e8de;--grn-bg:rgba(30,107,84,.07);
  --blu:#1e4a7a;--blu-l:#d0ddef;--blu-bg:rgba(30,74,122,.05);
  --pur:#6a3d7a;--pur-l:#e4d4ec;--pur-bg:rgba(106,61,122,.05);
  --gld:#8a6e1e;--gld-l:#f5ecd0;--gld-bg:rgba(138,110,30,.05);
  --tea:#2a6e6e;--tea-l:#cce8e4;--tea-bg:rgba(42,110,110,.06);
  --bdr:#ddd6c8;--bdr2:#ede8df;--hl:#fff7e0;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:18px}
body{font-family:'BIZ UDGothic','Noto Sans JP',sans-serif;background:var(--bg);color:var(--body);line-height:1.5;-webkit-font-smoothing:antialiased;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* topbar */
.topbar{flex-shrink:0;background:#0F1923;padding:11px 20px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.topbar::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(255,255,255,.012) 3px,rgba(255,255,255,.012) 4px),repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.008) 3px,rgba(255,255,255,.008) 4px)}
.tb-badge{font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:600;padding:3px 10px;border-radius:2px;background:#C84B31;color:#fff;letter-spacing:.05em;position:relative;z-index:1;white-space:nowrap}
.tb-title{font-family:'Noto Serif JP',serif;font-size:1rem;font-weight:700;color:#fff;letter-spacing:.04em;position:relative;z-index:1}
.tb-sub{font-family:'JetBrains Mono',monospace;font-size:.63rem;color:rgba(255,255,255,.4);position:relative;z-index:1}

/* layout */
.layout{flex:1;display:flex;overflow:hidden}

/* sidebar */
.sidebar{width:210px;flex-shrink:0;overflow-y:auto;background:var(--card);border-right:1px solid var(--bdr);padding:6px 0}
.cat-hdr{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);padding:10px 14px 3px}
.pos-btn{display:flex;align-items:center;gap:7px;width:100%;padding:6px 14px;background:none;border:none;border-left:3px solid transparent;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:600;text-align:left;transition:background .1s;white-space:nowrap}
.pos-btn:hover{background:var(--card2)}
.pos-btn.active{border-left-color:currentColor;background:var(--hl)}
.pos-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pos-cnt{font-size:.62rem;color:var(--dim);font-weight:400;margin-left:auto}

/* main */
.main{flex:1;display:flex;overflow:hidden}
.main-left{width:280px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--bdr2);padding:16px 14px;background:var(--card)}
.main-right{flex:1;overflow-y:auto;padding:18px 22px}

/* pos header */
.pos-hdr{margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid var(--bdr)}
.pos-hdr-top{display:flex;align-items:flex-end;gap:14px;margin-bottom:0}
.pos-tag{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:600;line-height:1}
.pos-names{flex:1;display:flex;flex-direction:column;gap:2px;padding-bottom:2px}
.pos-en{font-family:'Cormorant Garamond','Noto Serif JP',serif;font-size:1.25rem;font-weight:700;color:var(--text);line-height:1.2}
.pos-ja{font-size:.82rem;color:var(--muted)}
.pos-stats{display:flex;gap:16px;padding-bottom:2px}
.stat-blk{display:flex;flex-direction:column;align-items:center}
.stat-n{font-family:'JetBrains Mono',monospace;font-size:1.35rem;font-weight:600}
.stat-l{font-family:'JetBrains Mono',monospace;font-size:.56rem;text-transform:uppercase;letter-spacing:.08em;color:var(--dim)}

/* type panel (left column) */
.type-panel-hdr{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.type-search{width:100%;padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:.72rem;border:1px solid var(--bdr);border-radius:3px;background:var(--bg);color:var(--body);outline:none;margin-bottom:7px}
.type-search:focus{border-color:var(--body)}
.type-list{display:flex;flex-direction:column;gap:2px}
.type-chip{display:flex;align-items:baseline;gap:6px;padding:5px 8px;border-radius:4px;cursor:pointer;border:1px solid transparent;font-family:'JetBrains Mono',monospace;font-size:.78rem;transition:background .1s;text-align:left;width:100%;background:none}
.type-chip:hover{background:var(--card2);border-color:var(--bdr)}
.type-chip.active{border-color:currentColor;background:var(--hl)}
.type-form{font-weight:600;flex-shrink:0}
.type-gloss{font-size:.64rem;color:var(--dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.type-cnt{font-size:.62rem;color:var(--dim);flex-shrink:0;margin-left:auto}
.type-clear{font-family:'JetBrains Mono',monospace;font-size:.62rem;padding:2px 8px;border:1px solid var(--bdr);border-radius:3px;background:none;color:var(--muted);cursor:pointer}
.type-clear:hover{border-color:var(--body);color:var(--text)}

/* section label */
.sec-lbl{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:8px}

/* pagination */
.pager{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.pg-btn{font-family:'JetBrains Mono',monospace;font-size:.68rem;padding:3px 9px;border:1px solid var(--bdr);border-radius:3px;background:var(--card);color:var(--muted);cursor:pointer}
.pg-btn:hover{border-color:var(--body);color:var(--text)}
.pg-btn.active{background:var(--body);color:#fff;border-color:var(--body)}
.pg-info{font-family:'JetBrains Mono',monospace;font-size:.63rem;color:var(--dim)}

/* example card */
.ex-card{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:11px 15px;margin-bottom:9px;position:relative}
.ex-bar{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:6px 0 0 6px}
.ex-meta{font-family:'JetBrains Mono',monospace;font-size:.61rem;color:var(--dim);margin-bottom:8px}

/* interlinear */
/* .igl: 形態素列を横並びにラップ */
.igl{display:flex;flex-wrap:wrap;gap:4px 0;align-items:flex-end;line-height:1}
/* .igl-unit: word_unit_id単位のブロック（形態素列を横に並べる） */
.igl-unit{display:flex;flex-direction:row;align-items:flex-end;margin-bottom:2px}
/* .igl-col: 1形態素ぶんの縦3段（morph/gloss/pos）*/
.igl-col{display:flex;flex-direction:column;align-items:center;border-radius:3px;padding:1px 0;transition:background .15s}
/* ターゲット品詞ハイライト */
.igl-col-hl{padding:2px 2px 1px;margin:-1px;position:relative}
.igl-col-hl::before{content:'';position:absolute;top:0;left:15%;right:15%;height:2px;border-radius:1px;background:var(--hl-bar-color,transparent)}
/* タイプ選択時の強調 */
.igl-col-hl-type{outline:1.5px solid;outline-offset:1px;border-radius:3px}
/* セパレータ列（-）も縦3段で高さを揃える */
.igl-sep-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:2px}
.igl-sep-m{font-family:'JetBrains Mono',monospace;font-size:.82rem;color:var(--bdr);line-height:1;padding:2px 0}
.igl-sep-g{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--bdr);line-height:1;padding:1px 0}
.igl-sep-p{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--bdr);line-height:1;padding:1px 0}
/* 各段のテキスト */
.igl-morph{font-family:'JetBrains Mono',monospace;font-size:.88rem;font-weight:500;color:var(--text);white-space:nowrap;padding:2px 3px;display:block;text-align:center}
.igl-gloss{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--muted);white-space:nowrap;padding:1px 3px;display:block;text-align:center}
.igl-pos  {font-family:'JetBrains Mono',monospace;font-size:.6rem;white-space:nowrap;padding:1px 3px;display:block;text-align:center;cursor:pointer;border-radius:2px}
.igl-pos:hover{background:var(--bdr2)}
.igl-morph-wrap{cursor:pointer;border-radius:2px;transition:background .1s;display:block;text-align:center}
.igl-morph-wrap:hover{background:var(--bdr2)}
/* 単位間スペーサー */
.igl-unit-gap{width:14px;flex-shrink:0}
.igl-bdry{font-family:'JetBrains Mono',monospace;font-size:.58rem;align-self:flex-end;padding-bottom:4px;opacity:.75;margin-left:2px}
.bd-EAC{color:var(--grn)}.bd-EQC{color:var(--blu)}.bd-EOS{color:var(--gld)}.bd-Q{color:var(--red)}

/* empty */
.empty{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:10px;color:var(--dim)}
.empty .icon{font-size:2.5rem;opacity:.3}
.empty p{font-family:'JetBrains Mono',monospace;font-size:.78rem}


/* sketch panel */
.tab-row{display:flex;gap:0;margin-bottom:14px;border-bottom:2px solid var(--bdr)}
.tab-btn{font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:600;padding:6px 16px;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;background:none;cursor:pointer;color:var(--dim);letter-spacing:.04em;text-transform:uppercase}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text)}
.tab-btn:hover:not(.active){color:var(--muted)}
.sketch-summary{font-size:.9rem;line-height:1.7;margin-bottom:16px;padding:10px 14px;background:var(--card2);border-left:3px solid var(--bdr);border-radius:0 4px 4px 0}
.sketch-section{margin-bottom:18px}
.sketch-head{font-family:'JetBrains Mono',monospace;font-size:.66rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
.sketch-body{font-size:.88rem;line-height:1.7;color:var(--body);margin-bottom:8px}
.sketch-table{width:100%;border-collapse:collapse;font-size:.82rem;margin:4px 0 8px}
.sketch-table th{text-align:left;font-family:'JetBrains Mono',monospace;font-size:.63rem;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;padding:5px 10px;border-bottom:1px solid var(--bdr)}
.sketch-table td{padding:5px 10px;border-bottom:1px solid var(--bdr2);vertical-align:top;font-family:'JetBrains Mono',monospace}
.sketch-table td:first-child{font-weight:600;white-space:nowrap;color:var(--text)}
.sketch-table tr:last-child td{border-bottom:none}
.sketch-table tr:hover td{background:var(--hl)}
.no-sketch{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--dim);padding:20px 0}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
</style>
</head>

</div>

connective":"接続・補文 Connective","discourse":"談話 Discourse","other":"その他 Other"},"sketches":{"N":{"title":"名詞 Noun","summary":"自立的な指示カテゴリ。格助詞・接語類を伴って項または修飾語として機能する。名詞自体は格変化しない（孤立型）。","sections":[{"head":"格フレーム","body":"名詞は単独では無標（裸形）。後続する格助詞（CP）によって統語的役割が決まる。","table":{"cols":["役割","助詞","グロス","例"],"rows":[["主格","=nu / =ga","NOM","N=nu …"],["属格","=nu / =ga","GEN","N=nu N"],["対格","=u / =ju","ACC","N=u V-THM"],["与格","=n","DAT","N=n V"],["奪格","=kara","ABL","N=kara V"],["向格","=nkai","ALL","N=nkai V"],["共格","=tu","COM","N=tu N"],["具格","=sii","INS","N=sii V"]]}},{"head":"主題・焦点","body":"接語 ISP によって主題（=a / =ja）・焦点（=du / =ga=du）がマークされる。これらは格助詞に後続する（例：N=nu=du「Nこそが」）。"},{"head":"形式名詞","body":"常に従属部（連体節等）を伴う名詞の下位類。tukja「時」、mai「前」、atu「後」、kutu「こと」（義務用法あり）、tami「ため」、=su「人・もの・こと」（接語形式）、munu「もの」など。=su は文法化が進み接辞化しつつある。人を指す場合は =su が必須で準体構文は不可、事柄を指す場合は準体構文と交替可能。"},{"head":"名詞句の従属部","body":"属格名詞句（=ga/=nu）、連体節（定動詞基本形）、連体詞（kunu/unu/kanu等）、引用助詞 =ti による補文が従属部に立つ。属格は所有に限らず、部分・全体、属性、関連話題、同格、数量限定など幅広い意味関係を標示する。"}]},"PRN":{"title":"代名詞 Pronoun","summary":"人称・指示・疑問・再帰のカテゴリをカバーする。人称代名詞は人称・数・包括/除外の区別を持つ（下地 2018: 136–137）。","sections":[{"head":"人称代名詞パラダイム","body":"形式は基本形（bare form）。格標識は後続 CP・ISP が担う。","table":{"cols":["","単数","双数（INCL）","複数 EXC","複数 INCL"],"rows":[["1人称","ban / ba","ba-fïtaa","ban-ti","duu"],["2人称","vva","—","—","—"],["3人称","uri / ui / kari","—","unukja","—"]]}},{"head":"包括・除外","body":"1人称非単数に聞き手を含む包括形（INCL）と含まない除外形（EXC）の対立がある。双数 ba-fïtaa は包括のみ（「私とあなた」）。コーパスでは具格 =sii との共起が多い（下地 2018: 137）。"},{"head":"指示・疑問・再帰","table":{"cols":["形式","グロス","意味"],"rows":[["uri / ui / kari","3SG","三人称単数"],["kuma / uma","ここ・そこ","近・中称場所"],["nau","何","疑問"],["nza","どこ","疑問場所"],["icɨ","いつ","疑問時"],["nara / naa / unagaduu","REFL","再帰"]]}}]},"V":{"title":"動詞 Verb","summary":"動詞語根は単独では現れず、必ず VAFX 接辞を伴う。語根は子音末（C語根）が基本。自他の区別あり。","sections":[{"head":"動詞語根の構造","body":"語根 + THM接辞（=i / =a）で語幹を形成。さらに時制・法・アスペクトの接辞が後続する。例：ik-i-tar「行った」（ik=語根, i=THM, tar=PST）。"},{"head":"コーパス頻出動詞","table":{"cols":["語根","グロス","token"],"rows":[["ik","行く","31"],["asɨ / as","する・言う","47"],["nar","なる","22"],["ss","知る","22"],["ur","いる（PROG語根）","39"],["ar","ある（COP/RSL）","23"],["fai","食べる","—"],["sïm","住む","—"]]}},{"head":"動詞語幹の構造","body":"語幹 = [語幹核（-使役）（-受動）（-尊敬）]。語幹核は単独語根、複合語幹、他品詞からの派生語幹のいずれか。屈折接辞は語幹に後続する。例：kak-as-ai-tar「書かせられた」= 語根kak + 使役-as + 受動-ai + 過去-tar。"},{"head":"動詞化接辞 -as","body":"第二対格 =a + 軽動詞 =sɨ を起源とする動詞化接辞。名詞語幹から動詞を派生する。中止形で屈折する。例：kansja-as-i-i「感謝して」、juui-jas-i-i「用意して」。目的語を取ることもできる（例：katana=a juui-jas-i-i「刀を用意して」）。"}]},"AUX":{"title":"助動詞 Auxiliary Verb","summary":"動詞に後続し、アスペクト・コピュラ・様態などを表す。それ自体も VAFX 連鎖を取る。","sections":[{"head":"主要な助動詞","table":{"cols":["形式","グロス","機能","token"],"rows":[["u / ur","PROG","進行・存在","90"],["a / ja / jar","COP","コピュラ","40"],["mii","EXP","試み・経験","13"],["sɨ","LV","軽動詞（複合動詞後項）","10"],["utui","CRCM","周辺的存在","8"],["cc","ENDO / 来る","内向き移動","14"],["fii","BEN","受益","4"],["par","去る","外向き移動","3"]]}}]},"VAFX":{"title":"動詞接辞 Verbal Affix","summary":"動詞語根に後続する屈折接辞。複数連鎖し、時制・アスペクト・極性・ヴォイス・法を表す。スロット位置に体系的な規則性がある。","sections":[{"head":"接辞スロット（末尾から）","body":"コーパスの VAFX 連鎖を末尾から数えた位置別分布。","table":{"cols":["スロット","主要グロス","機能"],"rows":[["-1（最終）","SEQ, PST, CSL, COND, RLS","時制・接続・解除条件"],["-2","THM, SEQ, PST, NEG","テーマ母音・否定・時制"],["-3","THM, PST, NEG, POT, CAUS","派生・否定・可能・使役"],["-4","THM, NEG, POT","最内層語幹形成"]]}},{"head":"主要グロス一覧","table":{"cols":["グロス","意味","典型形式"],"rows":[["THM","テーマ母音（語幹形成）","i / a"],["PST","過去","tar / ta"],["SEQ","連用・前置","i / ba"],["NEG","否定","n / na"],["CSL","当然・理由","ba"],["COND","条件","ba"],["RLS","解除条件（～たら）","tar=i"],["PASS","受身","ai"],["CAUS","使役","as / kas"],["POT","可能","kur"]]}}]},"CP":{"title":"格助詞 Case Particle","summary":"名詞句に接語（=）として付き、統語的役割をマークする孤立型格標示。同一名詞に複数のCPが連鎖することはない。","sections":[{"head":"格助詞パラダイム","table":{"cols":["グロス","形式","機能","token"],"rows":[["NOM","=nu / =ga","主格","99"],["ACC","=u / =ju / =mu","対格","137"],["GEN","=nu / =ga","属格","145"],["DAT","=n / =ni","与格","117"],["ABL","=kara","奪格","30"],["ALL","=nkai","向格","44"],["COM","=tu","共格","12"],["INS","=sii","具格","16"],["LMT","=gami","限界格","4"]]}},{"head":"NOM / GEN の同形","body":"主格と属格がともに =nu / =ga の形式を持つ。後続要素（動詞句 vs 名詞句）によって統語的に区別される。"},{"head":"対格の変異形","body":"対格は =u / =ju が基本。前接音環境により =mu（鼻音後）・=a / =ja / =na などの変異形が現れる（グロス ACC2）。"},{"head":"第二対格 =a（ACC2）","body":"対格 =u とは別に、第二対格 =a が存在する。主題助詞 =a と同形だが別形態素（狩俣方言の =ba との対応から）。中止形節（副動詞節）に生じやすく、非完結アスペクトの節に偏る傾向がある。ごく稀に自動詞主語も標示する（分裂自動詞性の可能性）。"},{"head":"与格 =n と方向格 =nkai の使い分け","body":"場所志向（場所・所有者・経験者）であるほど与格 =n を取りやすく、方向志向（目標・着点・受益者）であるほど方向格 =nkai を取りやすい。間接目的語は両方可能だが、授受動詞は与格、移動動詞は方向格が優勢。","table":{"cols":["機能","=n（与格）","=nkai（方向格）"],"rows":[["場所","○","×"],["時間","○","×"],["所有者","○","×"],["経験者","○","×"],["受身動作主","○","△"],["変化結果","○/△","△/○"],["被使役者","×","○"],["受益者","×","○"],["目標","×","○"]]}}]},"ISP":{"title":"相互作用助詞 Interactional Particle","summary":"主題・焦点・対比などの情報構造をマークする接語。格助詞の後に後続する（N=CP=ISP の語順）。","sections":[{"head":"主要な ISP","table":{"cols":["形式","グロス","機能","token"],"rows":[["=du","FOC","焦点（強調断定）","138"],["=a","TOP","主題","118"],["=ja","TOP","主題","52"],["=na","TOP","主題（変異形）","38"],["=ba / =baa","OTOP","対比主題","49"],["=ga","FOC","焦点（疑問）","28"],["=ru","FOC","焦点（=duの変異）","16"]]}},{"head":"焦点の機能分担","body":"=du は平叙文の強調焦点（「Nこそ」）に使われ、=ga は疑問文の焦点や WH 疑問に現れやすい。=ru は =du の音韻変異形。対比主題 =baa は「Nについては（他は別として）」の含意を持つ。"}]},"SFP":{"title":"文末助詞 Sentence-Final Particle","summary":"発話末端に付き、モダリティ・聴者への態度・疑問をマークする。","sections":[{"head":"主要な SFP","table":{"cols":["形式","グロス","機能","token"],"rows":[["=i / =ri / =mi / =ni","CNF","確認要求・念押し","79"],["=ca","HS","伝聞（heard-say）","56"],["=dooi / =dara","ASR","断言・主張","20"],["=ga / =mo / =ru / =e","Q","疑問","27"],["=jo","COR","共感・同意確認","7"],["=saai","ADR","呼びかけ","4"],["=munu","CSL","当然・弁明","3"]]}},{"head":"伝聞 HS","body":"=ca は話者が直接経験しなかった情報に付く伝聞標識。コーパスで2番目に多い SFP。会話での再話・伝聞が多いことを反映する。"}]},"CJP":{"title":"接続助詞 Conjunction Particle","summary":"節を後続節に連結する、または引用・補文節を形成する接語。EQC（引用節境界）を締める中心的な形式。","sections":[{"head":"主要な CJP","table":{"cols":["形式","グロス","機能","token"],"rows":[["=tii / =ti / =tti","QUOT","引用・補文標識","172"],["=kara","ANT","前後関係","6"],["=munu / =siba","CSL","当然・理由","7"],["=suga / =ruga","CNC","逆接","6"]]}},{"head":"引用標識 QUOT（=ti 類）","body":"=ti 類は直接・間接引用の両方に使われ、補文標識としても機能する。コーパスで断然多い（172件）。音韻変異：=ti → =tii（長母音）/ =tti（促音化）。"}]},"INTJ":{"title":"感動詞・談話標識 Interjection / Discourse Marker","summary":"発話の前置・挿入・応答に現れる。下地（2018）は mmja を感動詞の談話標識的用法とする。","sections":[{"head":"コーパス頻出形式","table":{"cols":["形式","グロス","機能","token"],"rows":[["mmja","DSC","談話標識（情報密度遷移点）","170"],["unu","FIL","フィラー（語彙検索）","40"],["aa","ああ","応答・驚き","30"],["nn","うん","応答・確認","27"],["naugara","FIL","フィラー（言い淀み？）","22"]]}},{"head":"mmja の談話機能","body":"下地（2018: 77）は「品詞として別個に談話標識というカテゴリーは設けず、感動詞 mmja の持つ特殊な用法の１つとしておく」としグロスを DSC とする。mmja は情報構造上の単位（主題と題述、焦点と前提）の間に生じることが極めて多く、主題要素の内部や題述要素の内部に生じることがほとんどない。この点が、単なる言いよどみ回避の間投詞 naugara「ええっと」との大きな違いである。コーパス分析では直後に語彙語（N/V/PRN/ADJ）が85.2%来ており、情報密度の高い内容の直前に出現するシグナルとして機能する。"},{"head":"オノマトペ","body":"オノマトペも間投詞に属する。即興性が高く話者間でバリエーションがある。引用助詞 =ti で節に埋め込まれる。例：guffa「グサッ」、dumma「ドンドン」、bžžbžž「びーびー（泣く音）」、doofɨ「崩れ落ちる音」、kjaakjaa「わいわい」。"}]},"ADV":{"title":"副詞 Adverb","summary":"動詞・形容詞・文全体を修飾する不変化詞。格助詞を取らない。","sections":[{"head":"主要な副詞（コーパスより）","table":{"cols":["形式","グロス","意味"],"rows":[["mai","ADT","も・さらに"],["muu","もう","既に（→ mmja と語源的に関連か）"],["nma","今","今"],["icɨ","いつ","いつ（疑問）"],["tiigarami","とにかく","とにかく"]]}}]},"ADJ":{"title":"形容詞 Adjective","summary":"PC語根（Property Concept語根）の完全重複により形成される。重複語幹の末尾1モーラが長音化する点で動詞の重複形と区別される。述語位置にも連体修飾位置にも立つ。","sections":[{"head":"形容詞の形成（完全重複）","body":"入力語根の語根末1モーラを長音化してコピーを作り、コピー+入力元の順で完全重複する。属性名詞も一部重複可能。","table":{"cols":["入力語根","形容詞","意味"],"rows":[["taka-","takaa+taka","高い"],["kiban-","kibann+kiban","貧しい"],["pjaa-","pjaaa+pjaa","速い"],["zau-","zauu+zau","よい"],["avva（属性名詞）","avvaa+avva","油っぽい"],["jarabi（属性名詞）","jarabii+jarabi","子供っぽい"]]}},{"head":"形容詞の活用","body":"述語として使う場合、PC語根 + AAFX（-k 等で動詞化）+ VAFX 連鎖という構造を取る。例：taka-k+a-tar「高かった」。連体修飾は属格助詞 =nu を介して行う（例：takaa+taka=nu pZtu「高い人」）。"},{"head":"複合PC語幹","body":"名詞語幹+PC語幹、PC語幹+PC語幹の複合で新たなPC語幹を形成できる。日本語のナ形容詞に相当する意味領域を担う。例：cɨmu+kagi「心清らかな」、uku+naga「大きくて長い」、jana+bata「残酷な」。"}]},"NAFX":{"title":"名詞接辞 Nominal Affix","summary":"名詞語幹に付く派生接辞。複数・指小・近似など、名詞の内部構造を形成する。語の内部要素であり形態統語的に従属的。","sections":[{"head":"主要な NAFX","table":{"cols":["形式","グロス","機能","例"],"rows":[["-gama","DIM","指小辞","ffa-gama「子供（小さい子）」"],["-ta / -mmi / -du","PL","複数","obasan-ta, ffa-mmi, vva-du"],["-nagi","APRX","曖昧性「など」","katana-nagi「刀など」"],["-bakaar","APRX/EXST","おおよそ「くらい」","sanzi-bakaar「3時くらい」"],["-ja","NLZ","名詞化","mm-pur-ja「イモ掘り（名詞）」"],["-nagina","ごと","包括「～ごと」","fɨni-nagina「船ごと」"],["-as / -jas","CVLZ","動名詞化（→XAFX寄り）","pukarassa-as「嬉しさ-VLZ」"]]}},{"head":"接辞の結束性","body":"名詞接辞は語内部のテンプレートに従い、順序の入れ替えや他要素の介入が不可能。例：ffa-gama-mmi=u「子供たちを」において -gama-mmi の間に何も挿入できない。この結束性によって助詞（接語）と区別される。"}]},"CONJ":{"title":"接続詞 Conjunction","summary":"節の先頭に現れ、先行する節との論理関係を繋ぐ語。数は少なく、接続の機能は主に動詞の副動詞形式や接続助詞が担う。多くが動詞 as-「する」や ff-「来る」の副動詞形式を起源とする。","sections":[{"head":"主要な接続詞","table":{"cols":["形式","意味","備考"],"rows":[["mata","また","日本語起源。コーパス最多（36件）"],["aidu","それで・すると・さて","最も汎用的な談話接続（24件）"],["asi","それで・そうして","10件"],["assuga","しかし・でも","逆接（5件）"],["ttjaa / ttigaa","そしたら・なら","条件帰結の導入"],["ttee","じゃあ","話題転換"],["asiidu","そして",""],["dakedo","だけど","日本語借用"]]}}]},"PN":{"title":"固有名詞 Proper Noun","summary":"人名・地名など固有の指示対象を持つ名詞。主格・属格で =ga を取る傾向が強い（代名詞的に使用可能なため）。統語的複合名詞の語幹としても頻出する（例：mjaaku-pZtu「宮古人」）。","sections":[{"head":"コーパス頻出固有名詞","table":{"cols":["形式","意味","token"],"rows":[["kinroo","キンロー（人名）","6"],["cikoo","チコウ（人名）","4"],["uzunusjuu","うずぬしゅう（人名）","4"],["nuusiutaki","ヌーシ御嶽（聖地名）","4"],["ucɨnaa","沖縄","3"],["pZZarabasi","プサラバシ（地名）","3"],["taiwan","台湾","2"],["arakaa","アラカー（井戸名）","3"]]}}]},"ADN":{"title":"連体詞 Adnominal","summary":"名詞句の従属部のみに立ち、属格を取らずに直接名詞を修飾する。閉じたクラスで数が極めて少ない。指示連体詞以外は日本語起源の借用と思しきもののみ。","sections":[{"head":"指示連体詞","table":{"cols":["形式","意味","token"],"rows":[["unu","その","23"],["kanu","あの","7"],["kunu","この","3"]]}},{"head":"その他","body":"daizɨna「大変な」（九州方言 daizi「大事」の連体形 daizi=na が化石化した形）、ironna「いろんな」など、日本語由来と見られる少数の形式がある。"}]},"FN":{"title":"形式名詞 Formal Noun","summary":"常に従属部（連体節・属格名詞句等）を伴い、名詞句の主要部に立つ。文法化の程度は様々で、語から接語・接辞に変化しつつあるものもある。","sections":[{"head":"主要な形式名詞","table":{"cols":["形式","意味","備考"],"rows":[["munu","もの・者・こと","最頻出。補文化にも使用"],["kjaa / kja","間・時","「～している間」"],["tukja","時","「～する時」"],["kutu","こと","義務法接辞 -kutu に文法化中"],["atu","後","「～した後」"],["tami","ため","目的"],["dukja","時","天気等の状態の時"],["mai","前","「～する前」"],["jau","よう","常に与格 =n を伴う"],["njaa","よう（様態）","常に与格 =n を伴う"]]}},{"head":"二次的屈折接辞への文法化","body":"kutu → -kutu（義務法 OBL）、gumata → -gumata（確定未来法 ANTC）のように、形式名詞から動詞の屈折接辞へ文法化しつつある例がある。クラス1動詞の非過去接辞 -r が脱落して語幹に直接接続する。"}]},"NUM":{"title":"数詞 Numeral","summary":"固有数詞と日本語借用数詞が混在する。主格・属格では =ga を取る傾向がある（代名詞的使用の場合）が、数量限定の属格では =nu を取る。","sections":[{"head":"コーパスに見られる数詞","table":{"cols":["形式","意味","備考"],"rows":[["pZtu","1","固有数詞"],["fɨta","2","固有数詞。最頻出"],["mZZ","3","固有数詞"],["juu","4","固有数詞"],["icɨ","5","固有数詞"],["nana","7","固有数詞"],["hjaaku / hjaku","100","日本語起源"],["ifɨ","いくつ","疑問数詞"]]}}]},"CLF":{"title":"類別詞 Classifier","summary":"数詞に後続し、数えられる対象の種類を示す。数詞+類別詞で数量表現を構成する。","sections":[{"head":"主要な類別詞","table":{"cols":["形式","対象","例"],"rows":[["kiv","軒（家屋）","pZtu-kiv「1軒」"],["cɨ","一般（個）","fɨta-cɨ「2つ」"],["kui","回（動作回数）","fɨta-kui「2回」"],["n","日・CLF一般","mZZ-n「3日」"],["pagi","大きさ","ku-pagi「この大きさ」"],["sai","歳","roku-sai「6歳」"]]}}]},"DEM":{"title":"指示詞 Demonstrative","summary":"指示の機能を持つ語の機能類。複数の語類にまたがる：指示代名詞（PRN）、指示連体詞（ADN）、指示場所詞（PRN）、指示様態副詞（ADV）。DEM タグは独立の指示形式に付与される。","sections":[{"head":"指示詞の体系","table":{"cols":["","近称（ko-系）","中称（u-系）","遠称（ka-系）"],"rows":[["代名詞","kuri","uri","kari"],["連体詞","kunu","unu","kanu"],["場所詞","kuma","uma","—"],["様態副詞","kui","ui","—"]]}}]},"AAFX":{"title":"形容詞接辞 Adjectival Affix","summary":"PC語根（形容詞語根）に付く接辞。動詞化（-k/-ka）、連用化（-fɨ）、名詞化（-sa, -munu）などの機能を持つ。PC語根から述語動詞を派生する際の中核的形態素。","sections":[{"head":"主要な AAFX","table":{"cols":["形式","グロス","機能","例"],"rows":[["-ka / -k","VLZ","動詞化（+状態動詞 ar-）","taka-k+a-tar「高かった」"],["-fɨ / -f","SEQ","連用形（中止形）","uu-fɨ nar-i-i「大きくなって」"],["-munu","DHD","準述語名詞化","acɨ+munu「暑いもの（だ）」"],["-cja / -tsja","SFN","接尾名詞化","gumaa-cja-gama「細かいの-DIM」"],["-kar","VLZ","動詞化（感情）","pukarasɨ-kar「嬉しくなる」"]]}},{"head":"PC語根→動詞の派生経路","body":"PC語根 + -k（動詞化）→ 動詞語幹を形成 → 状態動詞 ar- と複合して述語化。例：uku-「大きい」→ uku-k+ar-Ø「大きい（状態）」。この -k は PC語根にしか接続しない。"}]},"XAFX":{"title":"品詞横断接辞 Cross-category Affix","summary":"名詞から動詞への品詞転換（動詞化）を担う派生接辞。第二対格 =a + 軽動詞 =sɨ の文法化に由来する -as が中核。中止形で屈折する動詞語幹を形成する。","sections":[{"head":"主要な XAFX","table":{"cols":["形式","グロス","機能","例"],"rows":[["-as","CVLZ/VLZ","動詞化（最も生産的）","kansja-as-i-i「感謝して」"],["-jas","CVLZ/VLZ","動詞化（-as の変異形）","juui-jas-i-i「用意して」"],["-nas","CVLZ/VLZ","動詞化","ningin-nas-i-i「人間にして」"],["-us","CVLZ","動詞化","agu-us-i-i「一緒にして」"],["-ka","VLZ","動詞化（PC語根から）","batafɨsari-ka-i-ba「腹立たしくて」"]]}},{"head":"-as の文法化過程","body":"かつて第二対格目的語を取った軽動詞（N=a sɨ-「Nをする」）が、中止形副動詞で屈折する構造から接辞化。2モーラの自由形 asɨ は生じず、第二対格と軽動詞の間に要素が介入できず、-as で動詞化された語幹が独自の目的語を取りうる点が接辞化の根拠。"}]},"LP":{"title":"限定助詞 Limiter Particle","summary":"格助詞の後ろ、情報構造助詞の前に位置する接語。項に対して累加・対比・限定などの意味を加える。","sections":[{"head":"主要な LP","table":{"cols":["形式","グロス","機能","token"],"rows":[["=mai","ADD","累加「も」","108"],["=gami","CNT/LMT","限り「まで・だけ」","12"],["=bakaar","APRX/EXST","おおよそ「くらい」","6"],["=cumma","EVEN/ECH","さえ・すら","4"],["=kara","PRM/ANT","優先「まず～から」","2"],["=tuka","EXM","例示「とか」","2"]]}},{"head":"=mai の広い分布","body":"=mai は項名詞句だけでなく、述語句の主動詞位置や副詞節末にも接続可能。統語的ホストは句・節と多様で、コーパス最頻出の限定助詞。"}]},"MP":{"title":"モーダル助詞 Modal Particle","summary":"節を統語的ホストに取り、話者の確信度やエビデンシャリティを表す。述語末の品詞を問わず接続する。","sections":[{"head":"主要な MP","table":{"cols":["形式","グロス","機能","token"],"rows":[["=dara","ASR/CRT","確信・断言「でしょう」","7"],["=gagara","DUB","疑念「かもしれない」","4"],["=bjaam","DUB","自問「かなあ」","1"],["=pazɨ","CJC","推測「だろう」","1"]]}}]},"RDB":{"title":"重複形 Reduplication","summary":"動詞語根の完全重複形。形容詞の重複（語根末長音化あり）と異なり、長音化を伴わない。多回性・習慣・動作のぼかし（「～したりする」）など、アスペクト的意味を表す。軽動詞構文の主動詞として機能する。","sections":[{"head":"動詞重複形の形成","body":"入力語根をそのまま完全重複する（語根末の長音化なし）。コピー+入力元語根の順（例：kair+kair RED+ひっくり返る「何度もひっくり返る」）。重複の2語幹のうちコピーがどちらかは、部分重複の語順（コピー+入力元）と形容詞の分析に基づく。","table":{"cols":["形式","元の動詞","意味"],"rows":[["maar+maar","maar-「回る」","回り回る"],["nagaa+naga","naga-「長い」(RED)","長い長い"],["aZZ+aZ","aZ-「言う」(RED)","あれこれ言う"],["par+par","par-「帰る」(RED)","帰って帰って"]]}}]},"ONM":{"title":"オノマトペ Onomatopoeia","summary":"擬音語・擬態語。即興性が高く話者間でバリエーションがある。多くは INTJ としてタグ付けされるが、連体修飾位置に立つものは ONM タグが付く。引用助詞 =ti で節に埋め込まれることが多い。","sections":[{"head":"ONM タグの用例","body":"コーパスでは dondon「どんどん」が連体修飾位置で ONM タグを受けている。多くのオノマトペは INTJ としてタグ付けされ、引用助詞 =ti（CJP）によって動詞句に統合される構造を取る（例：guffa=ti kurus-i-i「グサッと殺して」）。"}]}}};
const UTTS     = D.utts;
const SKETCHES = D.sketches||{};
const POS_TYPES= D.pos_types;   // {pos: [{f,c,g,u}, ...]}
const POS_STATS= D.pos_stats;
const POS_DESC = D.pos_desc;
const CAT_LBL  = D.cat_label;

const CAT_ORDER = ["nominal","verbal","affix","particle","connective","discourse","other"];
const CAT_VAR = {
  nominal:   {fg:'var(--red)', bg:'var(--red-bg)',  bd:'var(--red)'},
  verbal:    {fg:'var(--grn)',bg:'var(--grn-bg)',  bd:'var(--grn)'},
  affix:     {fg:'var(--pur)',bg:'var(--pur-bg)',  bd:'var(--pur)'},
  particle:  {fg:'var(--gld)',bg:'var(--gld-bg)',  bd:'var(--gld)'},
  connective:{fg:'var(--tea)',bg:'var(--tea-bg)',  bd:'var(--tea)'},
  discourse: {fg:'var(--blu)',bg:'var(--blu-bg)',  bd:'var(--blu)'},
  other:     {fg:'var(--muted)',bg:'var(--card2)', bd:'var(--bdr)'},
};

const POS_BY_CAT = {};
CAT_ORDER.forEach(c=>POS_BY_CAT[c]=[]);
Object.keys(POS_STATS).sort().forEach(p=>{
  const cat=(POS_DESC[p]||{}).cat||'other';
  (POS_BY_CAT[cat]=POS_BY_CAT[cat]||[]).push(p);
});

const PAGE_SIZE = 30;
let state = {pos:null, form:null, page:0, typeFilter:''};

/* ── Sidebar ── */
function buildSidebar(){
  let h='';
  CAT_ORDER.forEach(cat=>{
    const list=POS_BY_CAT[cat];if(!list||!list.length)return;
    const cv=CAT_VAR[cat]||CAT_VAR.other;
    h+=`<div class="cat-hdr">${CAT_LBL[cat]||cat}</div>`;
    list.forEach(p=>{
      const st=POS_STATS[p]||{};
      h+=`<button class="pos-btn" id="btn-${p}" onclick="selectPOS('${p}')" style="color:${cv.fg}">
        <span class="pos-dot" style="background:${cv.fg}"></span>
        <span style="flex:1">${p}</span>
        <span class="pos-cnt">${st.tc||0}</span>
      </button>`;
    });
  });
  document.getElementById('sidebar').innerHTML=h;
}

/* ── Select POS ── */
function selectPOS(p){
  state={pos:p,form:null,page:0,typeFilter:''};
  document.querySelectorAll('.pos-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('btn-'+p);
  if(btn){btn.classList.add('active');btn.scrollIntoView({block:'nearest'});}
  renderAll();
}

/* ── Select type ── */
function selectType(form){
  if(state.form===form){state.form=null;}else{state.form=form;}
  state.page=0;
  renderExamples();
  renderTypeList();
}

/* ── Render all ── */
function renderAll(){
  if(!state.pos){return;}
  const p=state.pos;
  const desc=POS_DESC[p]||{};
  const cat=desc.cat||'other';
  const cv=CAT_VAR[cat]||CAT_VAR.other;
  const st=POS_STATS[p]||{};

  document.getElementById('main-wrap').innerHTML=`
    <div class="main-left" id="main-left">
      <div class="pos-hdr">
        <div class="pos-hdr-top">
          <div class="pos-tag" style="color:${cv.fg}">${esc(p)}</div>
          <div class="pos-names">
            <div class="pos-en">${esc(desc.en||'')}</div>
            <div class="pos-ja">${esc(desc.ja||'')}</div>
          </div>
        </div>
        <div class="pos-stats" style="color:${cv.fg};margin-top:8px">
          <div class="stat-blk"><div class="stat-n">${st.tc||0}</div><div class="stat-l">tokens</div></div>
          <div class="stat-blk"><div class="stat-n">${st.vc||0}</div><div class="stat-l">types</div></div>
          <div class="stat-blk"><div class="stat-n">${st.uc||0}</div><div class="stat-l">発話</div></div>
        </div>
      </div>
      <div class="type-panel-hdr">
        <span>タイプ一覧</span>
        <button class="type-clear" id="clear-btn" onclick="selectType(null)" style="display:none">全件表示</button>
      </div>
      <input class="type-search" id="type-search" placeholder="タイプを絞り込み…" oninput="state.typeFilter=this.value;renderTypeList()">
      <div class="type-list" id="type-list"></div>
    </div>
    <div class="main-right" id="main-right">
      <div class="tab-row">
        <button class="tab-btn active" id="tab-ex"   onclick="switchTab('ex')">用例</button>
        <button class="tab-btn"        id="tab-sk"   onclick="switchTab('sk')">文法スケッチ</button>
      </div>
      <div id="tab-ex-body">
        <div class="sec-lbl" id="ex-lbl"></div>
        <div id="pager-top"></div>
        <div id="ex-list"></div>
        <div id="pager-bot"></div>
      </div>
      <div id="tab-sk-body" style="display:none"></div>
    </div>
  `;
  renderTypeList();
  renderExamples();
}

/* ── Type list ── */
function renderTypeList(){
  const p=state.pos;if(!p)return;
  const types=POS_TYPES[p]||[];
  const desc=POS_DESC[p]||{};
  const cat=desc.cat||'other';
  const cv=CAT_VAR[cat]||CAT_VAR.other;
  const q=state.typeFilter.toLowerCase();

  const filtered=q?types.filter(t=>t.f.toLowerCase().includes(q)||t.g.join(' ').toLowerCase().includes(q)):types;

  let h='';
  filtered.forEach(t=>{
    const isActive=state.form===t.f;
    const glossStr=t.g.join(' / ');
    h+=`<button class="type-chip ${isActive?'active':''}" style="color:${cv.fg}" onclick="selectType('${esc(t.f)}')">
      <span class="type-form">${esc(t.f)}</span>
      <span class="type-gloss">${esc(glossStr)}</span>
      <span class="type-cnt">×${t.c}</span>
    </button>`;
  });
  if(!h)h=`<div style="color:var(--dim);font-family:JetBrains Mono,monospace;font-size:.7rem;padding:6px">一致なし</div>`;

  const tl=document.getElementById('type-list');
  if(tl)tl.innerHTML=h;
  const cb=document.getElementById('clear-btn');
  if(cb)cb.style.display=state.form?'':'none';
}

/* ── Examples ── */
function renderExamples(){
  const p=state.pos;if(!p)return;
  const desc=POS_DESC[p]||{};
  const cat=desc.cat||'other';
  const cv=CAT_VAR[cat]||CAT_VAR.other;
  const types=POS_TYPES[p]||[];

  // determine which utterance indices to show
  let uttIdxs;
  if(state.form){
    const t=types.find(t=>t.f===state.form);
    uttIdxs=t?t.u:[];
  } else {
    // union of all types
    const seen=new Set();
    uttIdxs=[];
    types.forEach(t=>t.u.forEach(ui=>{if(!seen.has(ui)){seen.add(ui);uttIdxs.push(ui);}}));
    uttIdxs.sort((a,b)=>a-b);
  }

  const total=uttIdxs.length;
  const totalPg=Math.ceil(total/PAGE_SIZE)||1;
  state.page=Math.min(state.page,totalPg-1);
  const pgStart=state.page*PAGE_SIZE;
  const pgEnd=Math.min(pgStart+PAGE_SIZE,total);
  const pageIdxs=uttIdxs.slice(pgStart,pgEnd);

  // label
  const lbl=document.getElementById('ex-lbl');
  if(lbl){
    const typeLabel=state.form
      ?`<span style="color:${cv.fg};font-weight:600">${esc(state.form)}</span> の用例`
      :'全タイプ用例';
    lbl.innerHTML=`${typeLabel} — ${total}発話 &ensp;
      <span style="font-weight:400;color:var(--dim)">
        <span style="display:inline-block;width:12px;height:10px;border-radius:2px;vertical-align:-1px;margin-right:2px;border-top:2px solid ${cv.fg};background:${cv.bg}"></span> 当該POS
        ${state.form?`<span style="display:inline-block;width:12px;height:10px;border-radius:2px;vertical-align:-1px;margin-right:2px;border-top:2px solid ${cv.fg};background:${cv.bg};outline:1.5px solid ${cv.fg};outline-offset:1px"></span> 選択タイプ`:''}
        &ensp;<span style="color:var(--grn)">EAC</span>
        <span style="color:var(--blu)">EQC</span>
        <span style="color:var(--gld)">EOS</span>
        <span style="color:var(--red)">Q</span>
      </span>`;
  }

  // pager
  function pagerHTML(){
    if(totalPg<=1)return'';
    let h=`<div class="pager"><span class="pg-info">${pgStart+1}–${pgEnd} / ${total}</span>`;
    if(state.page>0)h+=`<button class="pg-btn" onclick="goPage(${state.page-1})">← 前</button>`;
    const lo=Math.max(0,state.page-3),hi=Math.min(totalPg-1,state.page+3);
    for(let i=lo;i<=hi;i++){
      h+=`<button class="pg-btn${i===state.page?' active':''}" onclick="goPage(${i})">${i+1}</button>`;
    }
    if(state.page<totalPg-1)h+=`<button class="pg-btn" onclick="goPage(${state.page+1})">次 →</button>`;
    h+='</div>';return h;
  }

  // cards
  const cards=pageIdxs.map(ui=>{
    const utt=UTTS[ui];
    const igl=renderIGL(utt,p,state.form,cv);
    return`<div class="ex-card">
      <div class="ex-bar" style="background:${cv.bd}"></div>
      <div class="ex-meta">発話 #${ui+1} &ensp;|&ensp; ${utt.m.length}形態素</div>
      ${igl}
    </div>`;
  }).join('');

  const pt=document.getElementById('pager-top');
  const pb=document.getElementById('pager-bot');
  const el=document.getElementById('ex-list');
  if(pt)pt.innerHTML=pagerHTML();
  if(pb)pb.innerHTML=pagerHTML();
  if(el)el.innerHTML=cards||`<div style="color:var(--dim);font-family:JetBrains Mono,monospace;font-size:.75rem">用例なし</div>`;
  const mr=document.getElementById('main-right');
  if(mr)mr.scrollTop=0;
}

function goPage(n){state.page=n;renderExamples();}

/* ── Interlinear ── */
function renderIGL(utt, targetPOS, targetForm, cv){
  const {m:morphs,g:gloss,p:pos,d:wid,b:boundary}=utt;
  const n=morphs.length;

  // word_id（文節単位）でグループ化：自立語＋接辞＋接語が同グループに入る
  const CLITIC_POS = new Set(['CP','ISP','SFP','TOP','LP','MP','DAT','CJP']);
  const AFX_POS    = new Set(['VAFX','NAFX','AAFX','XAFX']);

  const groups=[];let cur=null;
  for(let mi=0;mi<n;mi++){
    if(!cur||cur.wid!==wid[mi]){cur={wid:wid[mi],items:[],bdry:null};groups.push(cur);}
    cur.items.push({mi,form:morphs[mi],g:gloss[mi],p:pos[mi]});
    if(boundary[mi])cur.bdry=boundary[mi];
  }

  // 構造：
  //   .igl（横並びwrap）
  //     .igl-unit-gap（単位間スペース）
  //     .igl-unit（1 word_unit分、横並び）
  //       .igl-sep-col（"-"区切り列、morph/gloss/posで高さ揃え）
  //       .igl-col（1形態素列：morph/gloss/posを縦に積む）
  //         .igl-morph-wrap > .igl-morph
  //         .igl-gloss
  //         .igl-pos
  // → 列単位なので morph・gloss・pos が同じ列幅を共有しズレない

  let h='<div class="igl">';
  groups.forEach((grp,gi)=>{
    if(gi>0) h+='<div class="igl-unit-gap"></div>';
    h+='<div class="igl-unit">';

    grp.items.forEach((it,ii)=>{
      // セパレータ：clitic P類は=、AFX類は-
      if(ii>0){
        const sep = CLITIC_POS.has(it.p) ? '=' : '-';
        h+=`<div class="igl-sep-col">
          <span class="igl-sep-m">${sep}</span>
          <span class="igl-sep-g">${sep}</span>
          <span class="igl-sep-p">${sep}</span>
        </div>`;
      }

      const isPOS  = it.p===targetPOS;
      const isType = isPOS && targetForm && it.form===targetForm;
      const itCat  = (POS_DESC[it.p]||{}).cat||'other';
      const itFg   = (CAT_VAR[itCat]||CAT_VAR.other).fg;

      const mCol = isPOS ? cv.fg : 'var(--text)';
      const mFw  = isPOS ? 700 : 500;
      const mDec = isType ? 'underline' : 'none';
      const gCol = isPOS ? cv.fg : 'var(--muted)';
      const gFw  = isType ? 600 : 400;
      const pCol = isPOS ? cv.fg : itFg;
      const pFw  = isPOS ? 600 : 400;
      const pDec = isType ? 'underline' : 'none';

      // ハイライト背景
      const hlCls = isPOS ? ' igl-col-hl'+(isType?' igl-col-hl-type':'') : '';
      const hlBg  = isPOS ? `background:${cv.bg};` : '';
      const hlBar = isPOS ? `--hl-bar-color:${cv.fg};` : '';
      const hlOut = isType ? `outline-color:${cv.fg};` : '';

      h+=`<div class="igl-col${hlCls}" style="${hlBg}${hlBar}${hlOut}">
        <span class="igl-morph-wrap" onclick="showPOS_fromIGL('${esc(it.p)}')" title="→ ${esc(it.p)}">
          <span class="igl-morph" style="color:${mCol};font-weight:${mFw};text-decoration:${mDec}">${esc(it.form)}</span>
        </span>
        <span class="igl-gloss" style="color:${gCol};font-weight:${gFw}">${esc(it.g)}</span>
        <span class="igl-pos" style="color:${pCol};font-weight:${pFw};text-decoration:${pDec}" onclick="showPOS_fromIGL('${esc(it.p)}')" title="→ ${esc(it.p)}">${esc(it.p)}</span>
      </div>`;
    });

    h+='</div>'; // igl-unit

    if(grp.bdry){
      const bc='bd-'+grp.bdry.replace(/\+.*/,'');
      h+=`<div class="igl-bdry ${bc}">${esc(grp.bdry)}</div>`;
    }
  });
  h+='</div>';
  return h;
}


function switchTab(tab){
  document.getElementById('tab-ex').classList.toggle('active', tab==='ex');
  document.getElementById('tab-sk').classList.toggle('active', tab==='sk');
  document.getElementById('tab-ex-body').style.display = tab==='ex' ? '' : 'none';
  document.getElementById('tab-sk-body').style.display = tab==='sk' ? '' : 'none';
  if(tab==='sk') renderSketch(state.pos);
}

function renderSketch(p){
  const el = document.getElementById('tab-sk-body');
  if(!el) return;
  const sk = SKETCHES[p];
  const desc = POS_DESC[p]||{};
  const cat  = desc.cat||'other';
  const cv   = CAT_VAR[cat]||CAT_VAR.other;
  if(!sk){
    el.innerHTML=`<div class="no-sketch">文法スケッチは未作成です。</div>`;
    return;
  }
  let h = `<div class="sketch-summary" style="border-left-color:${cv.bd}">${esc(sk.summary)}</div>`;
  (sk.sections||[]).forEach(sec=>{
    h += `<div class="sketch-section">`;
    h += `<div class="sketch-head" style="color:${cv.fg}">${esc(sec.head)}</div>`;
    if(sec.body) h += `<div class="sketch-body">${esc(sec.body)}</div>`;
    if(sec.table){
      h += `<table class="sketch-table"><thead><tr>`;
      sec.table.cols.forEach(c => h += `<th>${esc(c)}</th>`);
      h += `</tr></thead><tbody>`;
      sec.table.rows.forEach(row => {
        h += `<tr>`;
        row.forEach((cell,ci) => {
          const style = ci===0 ? `style="color:${cv.fg}"` : '';
          h += `<td ${style}>${esc(cell)}</td>`;
        });
        h += `</tr>`;
      });
      h += `</tbody></table>`;
    }
    h += `</div>`;
  });
  // 出典注
  if(p==='PRN') h += `<div style="font-size:.7rem;color:var(--dim);margin-top:8px;font-family:'JetBrains Mono',monospace">出典：下地理則（2018）「宮古語伊良部島方言の文法」pp.136–137</div>`;
  el.innerHTML = h;
}
function showPOS_fromIGL(p){
  if(p===state.pos)return;
  selectPOS(p);
}

function esc(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function route(){const h=location.hash.replace('#','');if(h&&POS_STATS[h])selectPOS(h);}
buildSidebar();
window.addEventListener('hashchange',route);
route();
</script>
